name: Run Repo Analyzer

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub Repo URL"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - name: Run Analyzer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node analyze.js "${{ github.event.inputs.repo_url }}"
