name: AI Code Review

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install axios

      - name: Run AI analysis
        run: node analyze.js "https://github.com/${{ github.repository }}"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ✅ 브랜치 생성 + 커밋
      - name: Commit README
        run: |
          git checkout -b ai-readme
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"
          git add README.md review.txt
          git commit -m "🤖 AI generated README & review"
          git push origin ai-readme

      # ✅ PR 생성
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-readme
          title: "🤖 AI README & Code Review"
          body: |
            ## 🤖 AI Generated Review
            
            See review.txt for details.

      # ✅ PR 코멘트 추가
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const pr = prs.data[0];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "🤖 AI Review:\n\n" + review
            });
